name: Publish to RedGuides

on:
  push:
    branches: [ "main" ]

jobs:
  redfetch-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Zip File
        shell: bash
        run: |
          rm -f release.zip
          while IFS= read -r -d '' file; do
            zip -q release.zip "$file"
          done < <(
            git ls-files -z -- . \
              ':(exclude).github/**' \
              ':(exclude).gitignore'
          )

      - name: Publish to RedGuides
        uses: RedGuides/redguides-publish@v1
        env:
          REDGUIDES_API_KEY: ${{ secrets.REDGUIDES_API_KEY }}
        with:
          resource_id: '3217'
          description: 'README.md'
          file: 'release.zip'
          domain: 'https://raw.githubusercontent.com/andude2/EZInventory/main/'
